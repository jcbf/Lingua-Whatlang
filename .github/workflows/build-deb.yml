name: Build Ubuntu Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-deb:
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04", "26.04"]
    runs-on: ${{ fromJSON(format('["self-hosted", "ubuntu-{0}"]', matrix.ubuntu)) }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Prepare runner disk
        run: |
          df -h / /tmp/runner 2>/dev/null || df -h
          apt-get clean 2>/dev/null || true
          rm -rf /var/cache/apt/archives/* 2>/dev/null || true
          for wd in /tmp/runner/work-22.04 /tmp/runner/work-24.04 /tmp/runner/work-26.04; do
            rm -rf \
              "${wd}/_work" \
              "${wd}/_tool" \
              "${wd}/_temp/cargo" \
              "${wd}/_temp/cargo-target" \
              "${wd}/_temp/perl-local" \
              "${wd}/_temp/apt-cache" 2>/dev/null || true
          done
          df -h / /tmp/runner 2>/dev/null || true

      - uses: actions/checkout@v7

      - name: Install Perl dependencies
        run: |
          set -euo pipefail
          APT_CACHE="${RUNNER_TEMP}/apt-cache"
          mkdir -p "$APT_CACHE"

          if ! command -v cpanm >/dev/null; then
            curl -fsSL https://cpanmin.us -o /usr/local/bin/cpanm
            chmod +x /usr/local/bin/cpanm
          fi

          if ! dpkg -s libperl-dev >/dev/null 2>&1; then
            apt-get -o Dir::Cache::archives="$APT_CACHE" \
              -o APT::Keep-Downloaded-Packages=false \
              install -y --no-install-recommends libperl-dev
          fi
          rm -rf "$APT_CACHE"

          if ! perl -MFFI::Platypus -e1 2>/dev/null; then
            cpanm --notest FFI::Platypus
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        run: |
          perl Makefile.PL INSTALLDIRS=vendor
          make
          make test

      - name: Package .deb
        run: |
          set -e
          VERSION=$(perl -ne '/our \$VERSION = .([\d.]+)./ && print $1' lib/Lingua/Whatlang.pm)
          ARCH=$(dpkg --print-architecture)
          PKGROOT="$PWD/pkgroot"

          make install DESTDIR="$PKGROOT"
          mkdir -p "$PKGROOT/DEBIAN"

          SIZE=$(du -sk "$PKGROOT" --exclude=DEBIAN | cut -f1)
          {
            echo "Package: liblingua-whatlang-perl"
            echo "Version: ${VERSION}-ubuntu${{ matrix.ubuntu }}"
            echo "Section: perl"
            echo "Priority: optional"
            echo "Architecture: ${ARCH}"
            echo "Installed-Size: ${SIZE}"
            echo "Depends: perl, libc6"
            echo "Maintainer: jose.ferreira@anubisnetworks.com"
            echo "Description: Fast natural language detection for Perl (Rust FFI backend)"
            echo " Blazingly fast, lightweight language detection library for Perl,"
            echo " providing FFI bindings to the Rust whatlang engine."
          } > "$PKGROOT/DEBIAN/control"

          dpkg-deb --root-owner-group --build "$PKGROOT" \
            "liblingua-whatlang-perl_${VERSION}_ubuntu${{ matrix.ubuntu }}_${ARCH}.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu-${{ matrix.ubuntu }}
          path: '*.deb'

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf target pkgroot blib 2>/dev/null || true
          rm -rf "${RUNNER_TEMP}/cargo" "${RUNNER_TEMP}/perl-local" "${RUNNER_TEMP}/apt-cache" 2>/dev/null || true
